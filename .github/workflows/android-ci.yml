name: Android CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'android/**'
      - '.github/workflows/android-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'android/**'
      - '.github/workflows/android-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  lint:
    name: Kotlin Lint + Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Ktlint check
        run: cd android && ./gradlew ktlintCheck --no-daemon

      - name: Detekt
        run: cd android && ./gradlew detekt --no-daemon

      - name: Android lint
        run: cd android && ./gradlew lint --no-daemon

      - name: Upload lint reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-reports
          path: android/app/build/reports/

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Run unit tests (sideload flavor)
        run: cd android && ./gradlew testSideloadDebugUnitTest --no-daemon

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: android/app/build/reports/tests/

      - name: Test Summary
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: 'android/app/build/test-results/**/*.xml'
          reporter: java-junit

  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build debug APK
        run: cd android && ./gradlew assembleSideloadDebug --no-daemon
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_TEST }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_TEST }}

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: neuron-debug-apk-${{ github.sha }}
          path: android/app/build/outputs/apk/sideload/debug/*.apk
          retention-days: 7

  ai-review:
    name: AI Code Review (Claude)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44

      - name: Claude AI Review
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            Review this PR for the Neuron Android AI agent project.
            Focus on:
            1. Security: Any sensitive data being sent to cloud that shouldn't be?
            2. AccessibilityService: Correct API usage, no ANRs?
            3. LLM routing: Is the sensitivity gate properly checked?
            4. Memory leaks in Android services?
            5. Proper coroutine scope management?
            6. Hard-coded API keys or package names?
            Be concise. Flag critical issues only.
          changed_files: ${{ steps.changed-files.outputs.all_changed_files }}
